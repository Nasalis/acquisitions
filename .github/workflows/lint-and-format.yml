name: Lint & Format

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

jobs:
  lint-and-format:
    name: ESLint & Prettier
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ─── ESLint ────────────────────────────────────────────────────────────
      - name: Run ESLint
        id: eslint
        # Use the JSON reporter so we can parse results for annotations; also
        # keep the default formatter output visible in the raw log.
        run: |
          npm run lint -- \
            --format @microsoft/eslint-formatter-sarif \
            --output-file eslint-results.sarif \
          || (echo "ESLINT_FAILED=true" >> "$GITHUB_ENV" && exit 0)
          # A second pass to surface human-readable output in the log
          npm run lint || true
        continue-on-error: true

      - name: Upload ESLint SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: eslint-results.sarif
          category: eslint
        # Gracefully skip if the file was never written (e.g. lint succeeded
        # before the SARIF formatter ran).
        continue-on-error: true

      - name: Annotate ESLint failure
        if: env.ESLINT_FAILED == 'true'
        run: |
          echo "::error title=ESLint failed::Linting errors were found. \
          Run \`npm run lint:fix\` locally to automatically fix fixable issues, \
          then review and commit the remaining changes."
          exit 1

      # ─── Prettier ──────────────────────────────────────────────────────────
      - name: Run Prettier format check
        id: prettier
        run: npm run format:check
        continue-on-error: true

      - name: Annotate Prettier failure
        if: steps.prettier.outcome == 'failure'
        run: |
          echo "::error title=Prettier check failed::One or more files are not \
          formatted correctly. Run \`npm run format\` locally, then commit the \
          changes and push again."
          exit 1
