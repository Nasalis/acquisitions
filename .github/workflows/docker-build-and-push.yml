name: Docker – Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/kubernetes-demo-api

jobs:
  build-and-push:
    name: Build & push production image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Required to write the step summary
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Docker Buildx (multi-platform) ────────────────────────────────────
      - name: Set up QEMU (for cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── Registry login ────────────────────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─── Image metadata (tags & labels) ────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            # Branch name  (e.g. main)
            type=ref,event=branch
            # Short commit SHA  (e.g. sha-abc1234)
            type=sha,prefix=sha-,format=short
            # "latest" tag – only on default branch pushes
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            # Timestamp tag in prod-YYYYMMDD-HHmmss format
            type=raw,value=prod-{{date 'YYYYMMDD-HHmmss'}}

      # ─── Build & push ──────────────────────────────────────────────────────
      - name: Build and push production image
        id: build_push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Target the production stage if your Dockerfile uses multi-stage builds;
          # remove the line below if it is a single-stage Dockerfile.
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching – reuse cached layers from the registry between runs.
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}:buildcache,mode=max

      # ─── Step summary ──────────────────────────────────────────────────────
      - name: Generate GitHub step summary
        if: always()
        run: |
          IMAGE="${{ secrets.DOCKER_USERNAME }}/${{ github.event.repository.name }}"
          DIGEST="${{ steps.build_push.outputs.digest }}"

          {
            echo "## 🐳 Docker Build & Push Summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Image** | \`${IMAGE}\` |"
            echo "| **Digest** | \`${DIGEST:-n/a}\` |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
            echo "| **Triggered by** | \`${{ github.event_name }}\` on \`${{ github.ref_name }}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo ""
            echo "### Published tags"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
